<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Maybank Statements{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background-color: #f8f9fa;
      }
      .navbar-brand {
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .badge-processing {
        background-color: #ffc107;
        color: #000;
      }
      .badge-done {
        background-color: #198754;
      }
      .badge-error {
        background-color: #dc3545;
      }
      .drop-zone {
        border: 2px dashed #adb5bd;
        border-radius: 0.5rem;
        padding: 2rem;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .drop-zone.dragover {
        border-color: #0d6efd;
        background: #e9f0ff;
      }
      .drop-zone input[type="file"] {
        display: none;
      }
      #upload-spinner {
        display: none;
      }
      .htmx-request #upload-spinner {
        display: inline-block;
      }
      .htmx-request #upload-btn {
        display: none;
      }

      /* Highlight search match */
      mark {
        background: #fff3cd;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="bi bi-bank me-1"></i>Maybank Statements
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link {% block nav_upload %}{% endblock %}" href="/"
                >Upload</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% block nav_statements %}{% endblock %}"
                href="/statements/"
                >Statements</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% block nav_transactions %}{% endblock %}"
                href="/transactions/"
                >Transactions</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">{% block content %}{% endblock %}</main>

    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100">
      <div id="app-toast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div id="app-toast-body" class="toast-body"></div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS bundle (includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmKXiB6Drl4LrnYNIsGM5jv9xF3d"
      crossorigin="anonymous"
    ></script>
    <!-- HTMX -->
    <script
      src="https://unpkg.com/htmx.org@1.9.12"
      integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2uH8oKzn8jOd//lxBp3zz9jGDGa4CXIBBP"
      crossorigin="anonymous"
    ></script>

    <script>
      // Drag-and-drop enhancement for the drop zone
      document.addEventListener("DOMContentLoaded", () => {
        const zone = document.getElementById("drop-zone");
        if (!zone) return;
        const input = zone.querySelector("input[type=file]");
        const folderInput = document.getElementById("pdf-folder");
        const folderBtn = document.getElementById("pick-folder-btn");

        function isPdf(file) {
          return file && file.name && file.name.toLowerCase().endsWith(".pdf");
        }

        function setPdfFiles(fileList) {
          const files = Array.from(fileList || []);
          const pdfFiles = files.filter(isPdf);
          const dt = new DataTransfer();
          pdfFiles.forEach((file) => dt.items.add(file));
          input.files = dt.files;
          updateLabel(files.length - pdfFiles.length);
        }

        zone.addEventListener("click", () => input.click());

        if (folderBtn && folderInput) {
          folderBtn.addEventListener("click", () => folderInput.click());
          folderInput.addEventListener("change", () => setPdfFiles(folderInput.files));
        }

        zone.addEventListener("dragover", (e) => {
          e.preventDefault();
          zone.classList.add("dragover");
        });
        zone.addEventListener("dragleave", () =>
          zone.classList.remove("dragover"),
        );
        zone.addEventListener("drop", (e) => {
          e.preventDefault();
          zone.classList.remove("dragover");
          setPdfFiles(e.dataTransfer.files);
        });

        input.addEventListener("change", () => setPdfFiles(input.files));

        function updateLabel(skipped = 0) {
          const label = zone.querySelector("#drop-label");
          if (input.files && input.files.length > 0) {
            if (skipped > 0) {
              label.textContent = `${input.files.length} PDF file(s) selected (${skipped} non-PDF skipped)`;
            } else {
              label.textContent = `${input.files.length} PDF file(s) selected`;
            }
          } else {
            label.textContent = "Drag & drop PDFs here, or click to browse";
          }
        }
      });

      // Global HTMX-triggered toast feedback.
      document.body.addEventListener("showToast", (evt) => {
        const toastEl = document.getElementById("app-toast");
        const bodyEl = document.getElementById("app-toast-body");
        if (!toastEl || !bodyEl) return;

        const detail = evt.detail || {};
        const message = detail.message || "Done.";
        const level = (detail.level || "success").toLowerCase();

        toastEl.classList.remove("text-bg-success", "text-bg-warning", "text-bg-danger", "text-bg-info");
        if (level === "error" || level === "danger") {
          toastEl.classList.add("text-bg-danger");
        } else if (level === "warning") {
          toastEl.classList.add("text-bg-warning");
        } else if (level === "info") {
          toastEl.classList.add("text-bg-info");
        } else {
          toastEl.classList.add("text-bg-success");
        }

        bodyEl.textContent = message;
        const toast = bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 3500 });
        toast.show();
      });
    </script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
