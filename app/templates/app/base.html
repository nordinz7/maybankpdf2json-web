<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Maybank Statements{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved || (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>

    <style>
      :root {
        --bg: #fafafa;
        --bg-soft: #f4f4f5;
        --surface: #ffffff;
        --surface-2: #f7f7f8;
        --border: #e4e4e7;
        --border-strong: #d4d4d8;
        --text: #09090b;
        --text-muted: #71717a;
        --text-faint: #a1a1aa;
        --accent: #EAB308;
        --accent-hover: #CA8A04;
        --accent-soft: #fef9c3;
        --accent-fg: #422006;
        --success: #16a34a;
        --success-soft: #dcfce7;
        --danger: #dc2626;
        --danger-soft: #fee2e2;
        --warning: #f59e0b;
        --warning-soft: #fef3c7;
        --info: #0ea5e9;
        --info-soft: #e0f2fe;

        --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

        --radius-sm: 6px;
        --radius: 10px;
        --radius-lg: 14px;
        --radius-xl: 20px;

        --shadow-sm: 0 1px 2px 0 rgba(9, 9, 11, 0.04);
        --shadow: 0 1px 3px 0 rgba(9, 9, 11, 0.06), 0 1px 2px -1px rgba(9, 9, 11, 0.04);
        --shadow-lg: 0 10px 30px -10px rgba(9, 9, 11, 0.12), 0 4px 6px -4px rgba(9, 9, 11, 0.06);

        --ease: cubic-bezier(0.16, 1, 0.3, 1);
      }

      [data-theme="dark"] {
        --bg: #09090b;
        --bg-soft: #0f0f11;
        --surface: #141417;
        --surface-2: #1a1a1e;
        --border: #26262a;
        --border-strong: #3f3f46;
        --text: #fafafa;
        --text-muted: #a1a1aa;
        --text-faint: #71717a;
        --accent: #FACC15;
        --accent-hover: #EAB308;
        --accent-soft: #3a2d06;
        --accent-fg: #fef9c3;
        --success: #4ade80;
        --success-soft: #0b2e1b;
        --danger: #f87171;
        --danger-soft: #3a0f12;
        --warning: #fbbf24;
        --warning-soft: #3a2605;
        --info: #38bdf8;
        --info-soft: #0b2838;

        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.4);
        --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.5), 0 1px 2px -1px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 10px 30px -10px rgba(0, 0, 0, 0.6), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
      }

      * {
        border-color: var(--border);
      }

      /* Map Bootstrap's CSS variables to our tokens so components
         (tables, text-muted, borders) follow the active theme. */
      :root,
      [data-theme="light"],
      [data-theme="dark"] {
        --bs-body-color: var(--text);
        --bs-body-color-rgb: 9, 9, 11;
        --bs-body-bg: var(--bg);
        --bs-emphasis-color: var(--text);
        --bs-secondary-color: var(--text-muted);
        --bs-tertiary-color: var(--text-faint);
        --bs-border-color: var(--border);
        --bs-border-color-translucent: var(--border);
      }
      [data-theme="dark"] {
        --bs-body-color-rgb: 250, 250, 250;
      }

      .table {
        --bs-table-color: var(--text);
        --bs-table-bg: transparent;
        --bs-table-border-color: var(--border);
        --bs-table-striped-color: var(--text);
        --bs-table-striped-bg: var(--surface-2);
        --bs-table-active-color: var(--text);
        --bs-table-active-bg: var(--surface-2);
        --bs-table-hover-color: var(--text);
        --bs-table-hover-bg: var(--surface-2);
      }

      html, body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "cv11", "ss01";
      }

      body {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: -200px;
        right: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, var(--accent) 0%, transparent 65%);
        opacity: 0.12;
        pointer-events: none;
        z-index: 0;
        filter: blur(20px);
      }

      [data-theme="dark"] body::before {
        opacity: 0.08;
      }

      main {
        position: relative;
        z-index: 1;
      }

      /* Typography */
      h1, h2, h3, h4, h5, h6 {
        color: var(--text);
        letter-spacing: -0.02em;
        font-weight: 600;
      }
      .font-mono, .mono {
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
      }
      .text-muted {
        color: var(--text-muted) !important;
      }
      .text-faint {
        color: var(--text-faint) !important;
      }

      /* Navbar */
      .app-nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: color-mix(in oklab, var(--bg) 70%, transparent);
        backdrop-filter: saturate(180%) blur(16px);
        -webkit-backdrop-filter: saturate(180%) blur(16px);
        border-bottom: 1px solid var(--border);
      }
      .app-nav .container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text) !important;
        text-decoration: none;
        font-size: 1.05rem;
      }
      .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
        color: var(--accent-fg);
        font-size: 1rem;
        box-shadow: 0 4px 14px -4px color-mix(in oklab, var(--accent) 60%, transparent);
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }
      .nav-links a {
        position: relative;
        padding: 0.45rem 0.85rem;
        border-radius: var(--radius-sm);
        color: var(--text-muted);
        font-size: 0.9rem;
        font-weight: 500;
        text-decoration: none;
        transition: color 0.15s var(--ease), background 0.15s var(--ease);
      }
      .nav-links a:hover {
        color: var(--text);
        background: var(--surface-2);
      }
      .nav-links a.active {
        color: var(--text);
        background: var(--surface-2);
      }
      .nav-links a.active::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -0.85rem;
        transform: translateX(-50%);
        width: 20px;
        height: 2px;
        background: var(--accent);
        border-radius: 2px;
      }
      .theme-toggle {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.15s var(--ease);
        margin-left: 0.5rem;
      }
      .theme-toggle:hover {
        color: var(--text);
        border-color: var(--border-strong);
        transform: translateY(-1px);
      }
      [data-theme="light"] .theme-toggle .bi-moon-stars { display: inline-block; }
      [data-theme="light"] .theme-toggle .bi-sun { display: none; }
      [data-theme="dark"] .theme-toggle .bi-moon-stars { display: none; }
      [data-theme="dark"] .theme-toggle .bi-sun { display: inline-block; }

      /* Cards */
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
      }
      .panel-header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }
      .panel-title {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .panel-body {
        padding: 1.25rem;
      }

      .page-header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .page-title {
        margin: 0;
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .page-subtitle {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-top: 0.3rem;
      }

      /* Stat cards */
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.9rem;
        margin-bottom: 1.5rem;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.1rem 1.2rem;
        position: relative;
        overflow: hidden;
        transition: border-color 0.15s var(--ease), transform 0.2s var(--ease);
      }
      .stat-card:hover {
        border-color: var(--border-strong);
        transform: translateY(-1px);
      }
      .stat-label {
        font-size: 0.75rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .stat-value {
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
        font-size: 1.6rem;
        font-weight: 600;
        letter-spacing: -0.03em;
        margin-top: 0.45rem;
        line-height: 1.1;
        color: var(--text);
      }
      .stat-hint {
        font-size: 0.78rem;
        color: var(--text-faint);
        margin-top: 0.25rem;
      }
      .stat-accent .stat-value { color: var(--accent-hover); }
      [data-theme="dark"] .stat-accent .stat-value { color: var(--accent); }
      .stat-success .stat-value { color: var(--success); }
      .stat-danger .stat-value { color: var(--danger); }

      /* Forms */
      .form-label {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
        letter-spacing: 0.01em;
      }
      .form-control, .form-select {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.55rem 0.75rem;
        font-size: 0.9rem;
        transition: border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
      }
      .form-control:focus, .form-select:focus {
        background: var(--surface);
        color: var(--text);
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent);
      }
      .form-control::placeholder {
        color: var(--text-faint);
      }
      .input-group-text {
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-muted);
        border-right: 0;
      }
      .input-group > .form-control {
        border-left: 0;
      }
      .form-check-input {
        background-color: var(--surface);
        border-color: var(--border-strong);
      }
      .form-check-input:checked {
        background-color: var(--accent);
        border-color: var(--accent);
      }
      .form-check-input:focus {
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent);
      }
      .form-check-label {
        color: var(--text);
        font-size: 0.9rem;
      }
      .form-text {
        color: var(--text-faint);
      }

      /* Buttons */
      .btn {
        border-radius: var(--radius);
        font-weight: 500;
        font-size: 0.9rem;
        padding: 0.55rem 1rem;
        border: 1px solid transparent;
        transition: all 0.15s var(--ease);
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
      }
      .btn-primary {
        background: var(--text);
        border-color: var(--text);
        color: var(--bg);
      }
      .btn-primary:hover, .btn-primary:focus {
        background: color-mix(in oklab, var(--text) 85%, transparent);
        border-color: color-mix(in oklab, var(--text) 85%, transparent);
        color: var(--bg);
        transform: translateY(-1px);
        box-shadow: var(--shadow);
      }
      .btn-accent {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-fg);
      }
      .btn-accent:hover, .btn-accent:focus {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
        color: var(--accent-fg);
        transform: translateY(-1px);
        box-shadow: 0 8px 20px -8px color-mix(in oklab, var(--accent) 60%, transparent);
      }
      .btn-outline-secondary {
        background: var(--surface);
        border-color: var(--border);
        color: var(--text);
      }
      .btn-outline-secondary:hover, .btn-outline-secondary:focus {
        background: var(--surface-2);
        border-color: var(--border-strong);
        color: var(--text);
      }
      .btn-outline-danger {
        background: transparent;
        border-color: var(--border);
        color: var(--danger);
      }
      .btn-outline-danger:hover, .btn-outline-danger:focus {
        background: var(--danger-soft);
        border-color: var(--danger);
        color: var(--danger);
      }
      .btn-sm {
        padding: 0.35rem 0.7rem;
        font-size: 0.82rem;
      }
      .btn-icon {
        width: 34px;
        height: 34px;
        padding: 0;
        justify-content: center;
      }

      /* Drop zone */
      .drop-zone {
        position: relative;
        border-radius: var(--radius-lg);
        padding: 2.5rem 1.5rem;
        text-align: center;
        cursor: pointer;
        background: var(--surface-2);
        transition: all 0.25s var(--ease);
        overflow: hidden;
      }
      .drop-zone::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: var(--radius-lg);
        padding: 1.5px;
        background: linear-gradient(135deg, var(--border) 0%, var(--border) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        transition: opacity 0.25s var(--ease);
      }
      .drop-zone:hover {
        background: color-mix(in oklab, var(--accent) 6%, var(--surface-2));
      }
      .drop-zone:hover::before {
        background: linear-gradient(135deg, var(--border-strong) 0%, var(--border-strong) 100%);
      }
      .drop-zone.dragover {
        background: color-mix(in oklab, var(--accent) 10%, var(--surface-2));
        transform: scale(1.005);
      }
      .drop-zone.dragover::before {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 50%, var(--accent) 100%);
        background-size: 200% 200%;
        animation: gradient-shift 2s linear infinite;
      }
      @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
      }
      .drop-zone-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 1rem;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface);
        border: 1px solid var(--border);
        font-size: 1.6rem;
        color: var(--accent-hover);
        transition: transform 0.25s var(--ease);
      }
      [data-theme="dark"] .drop-zone-icon {
        color: var(--accent);
      }
      .drop-zone:hover .drop-zone-icon,
      .drop-zone.dragover .drop-zone-icon {
        transform: translateY(-3px) scale(1.05);
      }
      .drop-zone p {
        margin: 0;
        color: var(--text);
        font-weight: 500;
        font-size: 0.95rem;
      }
      .drop-zone .drop-hint {
        color: var(--text-muted);
        font-size: 0.82rem;
        margin-top: 0.3rem;
        font-weight: 400;
      }
      .drop-zone input[type="file"] {
        display: none;
      }

      /* Tables */
      .table {
        color: var(--text);
        margin-bottom: 0;
      }
      .table > :not(caption) > * > * {
        background-color: transparent;
        border-bottom-color: var(--border);
        padding: 0.8rem 1rem;
      }
      .table thead th {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        background: var(--surface-2) !important;
        border-bottom: 1px solid var(--border);
      }
      .table-hover tbody tr:hover > * {
        background-color: var(--surface-2);
      }
      .table tbody tr {
        transition: background-color 0.12s var(--ease);
      }

      /* Amount chips */
      .amount {
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
        font-weight: 500;
        font-size: 0.85rem;
      }
      .amount-chip {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 6px;
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
        font-weight: 500;
        font-size: 0.82rem;
      }
      .amount-positive {
        color: var(--success);
        background: var(--success-soft);
      }
      .amount-negative {
        color: var(--danger);
        background: var(--danger-soft);
      }

      /* Pills / badges */
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 2px 9px;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 500;
        background: var(--surface-2);
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .pill-success {
        color: var(--success);
        background: var(--success-soft);
        border-color: color-mix(in oklab, var(--success) 25%, transparent);
      }
      .pill-warning {
        color: var(--warning);
        background: var(--warning-soft);
        border-color: color-mix(in oklab, var(--warning) 25%, transparent);
      }
      .pill-danger {
        color: var(--danger);
        background: var(--danger-soft);
        border-color: color-mix(in oklab, var(--danger) 25%, transparent);
      }

      /* Empty state */
      .empty-state {
        padding: 3rem 1rem;
        text-align: center;
        color: var(--text-muted);
      }
      .empty-state-icon {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        color: var(--text-faint);
        margin-bottom: 0.9rem;
      }

      /* HTMX states */
      #upload-spinner { display: none; }
      .htmx-request #upload-spinner { display: inline-block; }
      .htmx-request #upload-btn { display: none; }

      /* Compact upload bar */
      .upload-bar {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 0.6rem 0.85rem;
      }
      .upload-bar-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .upload-drop-strip {
        flex: 1 1 180px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.42rem 0.75rem;
        border-radius: var(--radius);
        border: 1.5px dashed var(--border-strong);
        background: var(--surface-2);
        cursor: pointer;
        transition: border-color 0.15s var(--ease), background 0.15s var(--ease);
        min-width: 0;
        overflow: hidden;
      }
      .upload-drop-strip:hover,
      .upload-drop-strip.dragover {
        border-color: var(--accent);
        background: color-mix(in oklab, var(--accent) 7%, var(--surface-2));
      }
      .upload-drop-strip input[type="file"] { display: none; }
      .upload-drop-label {
        font-size: 0.82rem;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .upload-bar-btn {
        flex-shrink: 0;
        padding: 0.35rem 0.6rem;
      }
      .upload-bar-pwd {
        width: 160px;
        flex-shrink: 0;
      }
      .upload-override-label {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        color: var(--text-muted);
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        user-select: none;
      }
      @media (max-width: 640px) {
        .upload-bar-pwd { width: 120px; }
        .upload-drop-strip { flex-basis: 100%; }
      }

      .htmx-indicator { opacity: 0; transition: opacity 0.2s var(--ease); }
      .htmx-request .htmx-indicator { opacity: 1; }
      .htmx-request.htmx-indicator { opacity: 1; }

      /* Row transition on HTMX swap */
      @keyframes row-in {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .tx-row, .stmt-row {
        animation: row-in 0.2s var(--ease) both;
      }

      /* Match highlight */
      mark {
        background: var(--accent-soft);
        color: var(--accent-fg);
        padding: 0 2px;
        border-radius: 3px;
      }
      [data-theme="dark"] mark { color: var(--accent); }

      /* Toast */
      .toast {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(10px);
      }
      .toast.text-bg-success {
        border-color: color-mix(in oklab, var(--success) 40%, transparent);
      }
      .toast.text-bg-success .toast-body::before {
        content: "";
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--success);
        margin-right: 0.6rem;
        vertical-align: middle;
      }
      .toast.text-bg-warning {
        border-color: color-mix(in oklab, var(--warning) 40%, transparent);
      }
      .toast.text-bg-warning .toast-body::before {
        content: "";
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--warning);
        margin-right: 0.6rem;
        vertical-align: middle;
      }
      .toast.text-bg-danger {
        border-color: color-mix(in oklab, var(--danger) 40%, transparent);
      }
      .toast.text-bg-danger .toast-body::before {
        content: "";
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--danger);
        margin-right: 0.6rem;
        vertical-align: middle;
      }
      .toast .toast-body {
        font-size: 0.88rem;
        font-weight: 500;
      }
      .toast .btn-close {
        filter: invert(0);
      }
      [data-theme="dark"] .toast .btn-close {
        filter: invert(1);
      }

      /* Pagination */
      .pagination-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 1.25rem;
        padding: 0.5rem 0.25rem;
      }
      .page-btn {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        padding: 0.4rem 0.8rem;
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        text-decoration: none;
        transition: all 0.15s var(--ease);
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
      }
      .page-btn:hover {
        border-color: var(--border-strong);
        background: var(--surface-2);
        color: var(--text);
      }
      .page-btn:disabled, .page-btn[aria-disabled="true"] {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* Fade-in for main */
      main {
        animation: fade-in 0.35s var(--ease) both;
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 10px;
        border: 2px solid var(--bg);
      }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

      /* Utilities */
      .divider {
        height: 1px;
        background: var(--border);
        margin: 1rem 0;
      }
      .bg-surface { background: var(--surface); }
      .bg-surface-2 { background: var(--surface-2); }

      @media (max-width: 640px) {
        .page-title { font-size: 1.35rem; }
        .nav-links a { padding: 0.4rem 0.6rem; font-size: 0.85rem; }
        .brand span { display: none; }
      }
    </style>
  </head>
  <body>
    <nav class="app-nav">
      <div class="container">
        <a class="brand" href="/">
          <span class="brand-mark"><i class="bi bi-bank"></i></span>
          <span>Maybank&nbsp;Statements</span>
        </a>
        <div class="d-flex align-items-center">
          <div class="nav-links">
            <a class="{% block nav_statements %}{% endblock %}" href="/statements/">Statements</a>
            <a class="{% block nav_transactions %}{% endblock %}" href="/transactions/">Transactions</a>
          </div>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
            <i class="bi bi-moon-stars"></i>
            <i class="bi bi-sun"></i>
          </button>
        </div>
      </div>
    </nav>

    <main class="container py-4">{% block content %}{% endblock %}</main>

    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100">
      <div id="app-toast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div id="app-toast-body" class="toast-body"></div>
          <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmKXiB6Drl4LrnYNIsGM5jv9xF3d"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/htmx.org@1.9.12"
      integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2uH8oKzn8jOd//lxBp3zz9jGDGa4CXIBBP"
      crossorigin="anonymous"
    ></script>

    <script>
      // Theme toggle
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("theme-toggle");
        if (btn) {
          btn.addEventListener("click", () => {
            const root = document.documentElement;
            const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
            root.setAttribute("data-theme", next);
            try { localStorage.setItem("theme", next); } catch (e) {}
          });
        }

        // Drag-and-drop enhancement for the drop zone
        const zone = document.getElementById("drop-zone");
        if (!zone) return;
        const input = zone.querySelector("input[type=file]");
        const folderInput = document.getElementById("pdf-folder");
        const folderBtn = document.getElementById("pick-folder-btn");

        function isPdf(file) {
          return file && file.name && file.name.toLowerCase().endsWith(".pdf");
        }

        function setPdfFiles(fileList) {
          const files = Array.from(fileList || []);
          const pdfFiles = files.filter(isPdf);
          const dt = new DataTransfer();
          pdfFiles.forEach((file) => dt.items.add(file));
          input.files = dt.files;
          updateLabel(files.length - pdfFiles.length);
        }

        zone.addEventListener("click", () => input.click());

        if (folderBtn && folderInput) {
          folderBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            folderInput.click();
          });
          folderInput.addEventListener("change", () => setPdfFiles(folderInput.files));
        }

        zone.addEventListener("dragover", (e) => {
          e.preventDefault();
          zone.classList.add("dragover");
        });
        zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
        zone.addEventListener("drop", (e) => {
          e.preventDefault();
          zone.classList.remove("dragover");
          setPdfFiles(e.dataTransfer.files);
        });

        input.addEventListener("change", () => setPdfFiles(input.files));

        function updateLabel(skipped = 0) {
          const label = document.getElementById("drop-label");
          if (!label) return;
          if (input.files && input.files.length > 0) {
            const s = input.files.length > 1 ? "s" : "";
            label.textContent = skipped > 0
              ? `${input.files.length} PDF${s} ready · ${skipped} non-PDF${skipped > 1 ? "s" : ""} skipped`
              : `${input.files.length} PDF file${s} ready`;
          } else {
            label.textContent = "Drop PDFs or click to browse";
          }
        }
      });

      // Global HTMX-triggered toast feedback.
      document.body.addEventListener("showToast", (evt) => {
        const toastEl = document.getElementById("app-toast");
        const bodyEl = document.getElementById("app-toast-body");
        if (!toastEl || !bodyEl) return;

        const detail = evt.detail || {};
        const message = detail.message || "Done.";
        const level = (detail.level || "success").toLowerCase();

        toastEl.classList.remove("text-bg-success", "text-bg-warning", "text-bg-danger", "text-bg-info");
        if (level === "error" || level === "danger") {
          toastEl.classList.add("text-bg-danger");
        } else if (level === "warning") {
          toastEl.classList.add("text-bg-warning");
        } else if (level === "info") {
          toastEl.classList.add("text-bg-info");
        } else {
          toastEl.classList.add("text-bg-success");
        }

        bodyEl.textContent = message;
        const toast = bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 3500 });
        toast.show();
      });

      // Optional HTMX event to redirect after a short delay.
      document.body.addEventListener("redirectTo", (evt) => {
        const detail = evt.detail || {};
        const url = detail.url;
        if (!url) return;
        const delay = Number(detail.delay || 0);
        window.setTimeout(() => {
          window.location.assign(url);
        }, Number.isFinite(delay) && delay > 0 ? delay : 0);
      });

      // Keyboard shortcut: "/" focuses the first visible search input
      document.addEventListener("keydown", (e) => {
        if (e.key === "/" && !e.metaKey && !e.ctrlKey) {
          const target = e.target;
          if (target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA" || target.isContentEditable)) return;
          const search = document.querySelector("#q");
          if (search) {
            e.preventDefault();
            search.focus();
            search.select();
          }
        }
      });
    </script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
