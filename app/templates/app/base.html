<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Maybank Statements{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background-color: #f8f9fa;
      }
      .navbar-brand {
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .badge-processing {
        background-color: #ffc107;
        color: #000;
      }
      .badge-done {
        background-color: #198754;
      }
      .badge-error {
        background-color: #dc3545;
      }
      .drop-zone {
        border: 2px dashed #adb5bd;
        border-radius: 0.5rem;
        padding: 2rem;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .drop-zone.dragover {
        border-color: #0d6efd;
        background: #e9f0ff;
      }
      .drop-zone input[type="file"] {
        display: none;
      }
      #upload-spinner {
        display: none;
      }
      .htmx-request #upload-spinner {
        display: inline-block;
      }
      .htmx-request #upload-btn {
        display: none;
      }

      /* Highlight search match */
      mark {
        background: #fff3cd;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="bi bi-bank me-1"></i>Maybank Statements
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link {% block nav_upload %}{% endblock %}" href="/"
                >Upload</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% block nav_statements %}{% endblock %}"
                href="/statements/"
                >Statements</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% block nav_transactions %}{% endblock %}"
                href="/transactions/"
                >Transactions</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">{% block content %}{% endblock %}</main>

    <!-- Bootstrap JS bundle (includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmKXiB6Drl4LrnYNIsGM5jv9xF3d"
      crossorigin="anonymous"
    ></script>
    <!-- HTMX -->
    <script
      src="https://unpkg.com/htmx.org@1.9.12"
      integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2uH8oKzn8jOd//lxBp3zz9jGDGa4CXIBBP"
      crossorigin="anonymous"
    ></script>

    <script>
      // Drag-and-drop enhancement for the drop zone
      document.addEventListener("DOMContentLoaded", () => {
        const zone = document.getElementById("drop-zone");
        if (!zone) return;
        const input = zone.querySelector("input[type=file]");

        zone.addEventListener("click", () => input.click());

        zone.addEventListener("dragover", (e) => {
          e.preventDefault();
          zone.classList.add("dragover");
        });
        zone.addEventListener("dragleave", () =>
          zone.classList.remove("dragover"),
        );
        zone.addEventListener("drop", (e) => {
          e.preventDefault();
          zone.classList.remove("dragover");
          input.files = e.dataTransfer.files;
          updateLabel();
        });

        input.addEventListener("change", updateLabel);

        function updateLabel() {
          const label = zone.querySelector("#drop-label");
          if (input.files && input.files.length > 0) {
            label.textContent = `${input.files.length} file(s) selected`;
          } else {
            label.textContent = "Drag & drop PDFs here, or click to browse";
          }
        }
      });
    </script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
